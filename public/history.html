<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustVerify | Global History</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .history-container { max-width: 1000px; margin: 50px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #2c3e50; color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .status-verified { color: #27ae60; font-weight: bold; background: #e8f8f5; padding: 5px 10px; border-radius: 4px; }
        .status-tampered { color: #e74c3c; font-weight: bold; background: #fdedec; padding: 5px 10px; border-radius: 4px; }
        .btn-download { background: #3498db; color: white; text-decoration: none; padding: 8px 12px; border-radius: 4px; font-size: 14px; }
        .btn-download:hover { background: #2980b9; }
    </style>
</head>
<body style="background-color: #f4f7f6; font-family: sans-serif; margin: 0;">
    
    <nav style="padding: 20px; background: #2c3e50;">
        <a href="/verify.html" style="color: white; margin-right: 20px; text-decoration: none;">🏠 Home</a>
        <a href="/history.html" style="color: white; text-decoration: none;">📜 History & Certificates</a>
    </nav>

    <div class="history-container">
        <h1>📜 Verification Registry</h1>
        <p>Global registry of all document integrity checks.</p>
        
        <table>
            <thead>
                <tr>
                    <th>Date & Time</th>
                    <th>File Name</th>
                    <th>Status</th>
                    <th>Certificate</th>
                </tr>
            </thead>
            <tbody id="history-body">
                </tbody>
        </table>
    </div>

    <script>
        async function fetchHistory() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();
                const tableBody = document.getElementById('history-body');
                
                if (data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No verifications found in the database yet.</td></tr>';
                    return;
                }

                tableBody.innerHTML = data.map(item => `
                    <tr>
                        <td>${new Date(item.timestamp).toLocaleString()}</td>
                        <td><strong>${item.fileName}</strong></td>
                        <td>
                            <span class="${item.status === 'Verified' ? 'status-verified' : 'status-tampered'}">
                                ${item.status}
                            </span>
                        </td>
                        <td>
                            <a href="/download-certificate/${item.transactionId}" class="btn-download">📥 Download PDF</a>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error("Error loading history:", error);
                document.getElementById('history-body').innerHTML = '<tr><td colspan="4" style="color: red;">Failed to load history from server.</td></tr>';
            }
        }
        window.onload = fetchHistory;
    </script>
</body>
</html>
